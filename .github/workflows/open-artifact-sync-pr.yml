name: Open Artifact Sync PR

on:
  push:
    branches:
      - artifact-sync/**
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: open-artifact-sync-pr-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  open-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Create or update artifact sync pull request
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          TITLE=$(git log -1 --pretty=%s)
          BODY=$(git log -1 --pretty=%b)
          HEAD_REF="${GITHUB_REPOSITORY_OWNER}:${BRANCH_NAME}"
          EXISTING_PR_NUMBER=$(gh pr list --head "$HEAD_REF" --base main --json number --jq '.[0].number // empty')

          if [[ -n "$EXISTING_PR_NUMBER" ]]; then
            gh pr edit "$EXISTING_PR_NUMBER" --title "$TITLE" --body "${BODY:-Automated artifact sync update.}"
            PR_URL=$(gh pr view "$EXISTING_PR_NUMBER" --json url --jq .url)
            echo "operation=updated" >> "$GITHUB_OUTPUT"
            echo "url=${PR_URL}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_URL=$(gh pr create --base main --head "$HEAD_REF" --title "$TITLE" --body "${BODY:-Automated artifact sync update.}")
          echo "operation=created" >> "$GITHUB_OUTPUT"
          echo "url=${PR_URL}" >> "$GITHUB_OUTPUT"

      - name: Report pull request result
        run: |
          echo "Artifact sync pull request ${PR_OPERATION}: ${PR_URL}"
        env:
          PR_OPERATION: ${{ steps.pr.outputs.operation }}
          PR_URL: ${{ steps.pr.outputs.url }}