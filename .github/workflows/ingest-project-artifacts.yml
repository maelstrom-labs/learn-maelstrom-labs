name: Ingest Project Artifacts

on:
  workflow_call:
    inputs:
      github_app_id:
        description: Legacy input name; pass the GitHub App client ID used to mint the installation token.
        required: true
        type: string
      target_repository:
        required: false
        type: string
        default: maelstrom-labs/learn-maelstrom-labs
      target_branch:
        required: false
        type: string
        default: main
      manifest_path:
        required: false
        type: string
        default: learn-manifest.json
      project_slug:
        required: false
        type: string
        default: ""
      source_artifact_root:
        required: false
        type: string
        default: ""
    secrets:
      learn_site_app_private_key:
        required: true

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    concurrency:
      group: ingest-${{ inputs.target_repository }}-${{ inputs.target_branch }}
      cancel-in-progress: false

    steps:
      - name: Check out source repository
        uses: actions/checkout@v4
        with:
          path: source

      - name: Resolve target repository
        id: target-repository
        run: |
          TARGET_REPOSITORY="${TARGET_REPOSITORY_INPUT}"

          if [[ "${TARGET_REPOSITORY}" != */* ]]; then
            echo "Expected target_repository to be in owner/repo format." >&2
            exit 1
          fi

          echo "owner=${TARGET_REPOSITORY%%/*}" >> "$GITHUB_OUTPUT"
          echo "repository=${TARGET_REPOSITORY#*/}" >> "$GITHUB_OUTPUT"
        env:
          TARGET_REPOSITORY_INPUT: ${{ inputs.target_repository }}

      - name: Create learn-site installation token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ inputs.github_app_id }}
          private-key: ${{ secrets.learn_site_app_private_key }}
          owner: ${{ steps.target-repository.outputs.owner }}
          repositories: ${{ steps.target-repository.outputs.repository }}
          permission-contents: write
          permission-pull-requests: write

      - name: Check out learn site repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target_repository }}
          ref: ${{ inputs.target_branch }}
          token: ${{ steps.app-token.outputs.token }}
          path: site

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve project slug
        id: manifest
        run: |
          PROJECT_SLUG=$(node - <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");
          const sourceRoot = process.env.SOURCE_ROOT;
          const manifestPath = path.join(sourceRoot, process.env.MANIFEST_PATH);
          const overrideSlug = process.env.PROJECT_SLUG_OVERRIDE;
          if (overrideSlug) {
            process.stdout.write(overrideSlug);
            process.exit(0);
          }
          const manifest = JSON.parse(fs.readFileSync(manifestPath, "utf8"));
          process.stdout.write(manifest.project.slug);
          NODE
          )
          echo "project_slug=$PROJECT_SLUG" >> "$GITHUB_OUTPUT"
        env:
          SOURCE_ROOT: ${{ github.workspace }}/source
          MANIFEST_PATH: ${{ inputs.manifest_path }}
          PROJECT_SLUG_OVERRIDE: ${{ inputs.project_slug }}

      - name: Sync source artifacts into the site repo
        run: |
          EXTRA_ARGS=()

          if [[ -n "${SOURCE_ARTIFACT_ROOT}" ]]; then
            EXTRA_ARGS+=(--source-artifact-root "$SOURCE_ARTIFACT_ROOT")
          fi

          node site/scripts/sync-project-artifacts.mjs \
            --source-root "$GITHUB_WORKSPACE/source" \
            --target-root "$GITHUB_WORKSPACE/site" \
            --manifest-path "${MANIFEST_PATH}" \
            --project-slug "${PROJECT_SLUG}" \
            --source-repository "${GITHUB_REPOSITORY}" \
            --source-ref-name "${GITHUB_REF_NAME}" \
            --source-sha "${GITHUB_SHA}" \
            "${EXTRA_ARGS[@]}"
        env:
          MANIFEST_PATH: ${{ inputs.manifest_path }}
          PROJECT_SLUG: ${{ steps.manifest.outputs.project_slug }}
          SOURCE_ARTIFACT_ROOT: ${{ inputs.source_artifact_root }}

      - name: Create or update artifact sync pull request
        id: artifact-pr
        env:
          PROJECT_SLUG: ${{ steps.manifest.outputs.project_slug }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
          SOURCE_REPOSITORY: ${{ github.repository }}
          SOURCE_SHA: ${{ github.sha }}
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          path: site
          add-paths: |
            public/generated
            src/data/ingested-projects.json
            public/documents
          base: ${{ inputs.target_branch }}
          branch: artifact-sync/${{ steps.manifest.outputs.project_slug }}
          delete-branch: true
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          commit-message: |
            Sync ${{ steps.manifest.outputs.project_slug }} artifacts from ${{ github.repository }}@${{ github.sha }}

            Source ref: ${{ github.ref_name }}
          title: Sync ${{ steps.manifest.outputs.project_slug }} artifacts
          body: |
            Automated artifact sync for `${{ steps.manifest.outputs.project_slug }}`.

            - Source repository: `${{ github.repository }}`
            - Source ref: `${{ github.ref_name }}`
            - Source SHA: `${{ github.sha }}`
          labels: |
            automation
            artifact-sync

      - name: Report pull request result
        run: |
          if [[ "${PR_OPERATION}" == "none" ]]; then
            echo "No learn-site changes detected for ${PROJECT_SLUG}."
            exit 0
          fi

          echo "Artifact sync pull request ${PR_OPERATION}: ${PR_URL}"
        env:
          PROJECT_SLUG: ${{ steps.manifest.outputs.project_slug }}
          PR_OPERATION: ${{ steps.artifact-pr.outputs.pull-request-operation }}
          PR_URL: ${{ steps.artifact-pr.outputs.pull-request-url }}
