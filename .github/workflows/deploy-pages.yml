name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Resolve site environment
        run: |
          echo "SITE_URL=${SITE_URL:-https://learn.maelstromlabs.com}" >> "$GITHUB_ENV"
          echo "SITE_BASE_PATH=${SITE_BASE_PATH:-}" >> "$GITHUB_ENV"
        env:
          SITE_URL: ${{ vars['SITE_URL'] }}
          SITE_BASE_PATH: ${{ vars['SITE_BASE_PATH'] }}

      - name: Install dependencies
        run: npm ci

      - name: Validate project
        run: |
          npm run typecheck
          npm run lint

      - name: Build static export
        run: npm run build

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4